version: 0.2

env:
  variables:
    REMOTE_STATE_BUCKET: "jch254-terraform-remote-state"
  exported-variables:
    - COMMIT_MESSAGE
    - COMMIT_SHA
  parameter-store:
    CLOUDFLARE_API_TOKEN: "/reference-architecture/cloudflare-api-token"
    COOKIE_SECRET: "/reference-architecture/cookie-secret"

phases:
  install:
    commands:
      - |
        dockerd \
          --host=unix:///var/run/docker.sock \
          --storage-driver=vfs \
          --data-root=/tmp/docker \
          > /tmp/dockerd.log 2>&1 &
      - |
        for i in $(seq 1 20); do
          if docker info > /dev/null 2>&1; then
            echo "Docker is ready"
            break
          fi
          echo "Waiting for Docker ($i)..."
          sleep 2
        done
      - docker info || (echo "Docker failed to start" && cat /tmp/dockerd.log && exit 1)
      - npm install -g pnpm
      - pnpm install --frozen-lockfile
      - export IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:0:8}
      - chmod +x infrastructure/terraform/deploy-infrastructure.bash
      - chmod +x infrastructure/terraform/cloudflare/deploy-cloudflare.bash

  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo Build started on `date`
      - export COMMIT_MESSAGE="$(git log -1 --pretty=%s 2>/dev/null || echo '')"
      - export COMMIT_SHA="${CODEBUILD_RESOLVED_SOURCE_VERSION:-$CODEBUILD_SOURCE_VERSION}"
      - pnpm run build
      - echo Building notification Lambda...
      - mkdir -p infrastructure/terraform/lambda/build-notification-formatter/dist
      - npx esbuild infrastructure/terraform/lambda/build-notification-formatter/index.ts --bundle --platform=node --target=node20 --outfile=infrastructure/terraform/lambda/build-notification-formatter/dist/index.js --format=cjs --external:@aws-sdk/*
      - echo Building Docker image...
      - IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG"
      - docker build -t $IMAGE_URI .
      - echo Pushing Docker image...
      - docker push $IMAGE_URI

  post_build:
    commands:
      - echo Build completed on `date`
      - ./infrastructure/terraform/deploy-infrastructure.bash
      - echo Waiting for ECS service to stabilise...
      - aws ecs wait services-stable --cluster $CLUSTER_NAME --services $SERVICE_NAME
      - echo AWS deployment completed
      - ./infrastructure/terraform/cloudflare/deploy-cloudflare.bash
      - echo Deployment completed
      - echo Running system validation...
      - BASE_URL=https://reference-architecture.603.nz pnpm run validate

cache:
  paths:
    - "/root/.terraform.d/plugin-cache/**/*"
