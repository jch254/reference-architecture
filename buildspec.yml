version: 0.2

env:
  variables:
    REMOTE_STATE_BUCKET: "jch254-terraform-remote-state"
  parameter-store:
    CLOUDFLARE_API_TOKEN: "/reference-architecture/cloudflare-api-token"

phases:
  install:
    commands:
      - |
        dockerd \
          --host=unix:///var/run/docker.sock \
          --storage-driver=vfs \
          --data-root=/tmp/docker \
          > /tmp/dockerd.log 2>&1 &
      - |
        for i in $(seq 1 20); do
          if docker info > /dev/null 2>&1; then
            echo "Docker is ready"
            break
          fi
          echo "Waiting for Docker ($i)..."
          sleep 2
        done
      - docker info || (echo "Docker failed to start" && cat /tmp/dockerd.log && exit 1)
      - npm install -g pnpm
      - pnpm install --frozen-lockfile
      - export IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION:0:8}
      - chmod +x infrastructure/terraform/deploy-infrastructure.bash
      - chmod +x infrastructure/terraform/cloudflare/deploy-cloudflare.bash

  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com

  build:
    commands:
      - echo Build started on `date`
      - pnpm run build
      - echo Building Docker image...
      - IMAGE_URI="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG"
      - docker build -t $IMAGE_URI .
      - echo Pushing Docker image...
      - docker push $IMAGE_URI

  post_build:
    commands:
      - echo Build completed on `date`
      - ./infrastructure/terraform/deploy-infrastructure.bash
      - echo Waiting for ECS service to stabilise...
      - aws ecs wait services-stable --cluster $CLUSTER_NAME --services $SERVICE_NAME
      - echo AWS deployment completed
      - ./infrastructure/terraform/cloudflare/deploy-cloudflare.bash
      - echo Deployment completed

cache:
  paths:
    - "/root/.terraform.d/plugin-cache/**/*"
